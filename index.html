<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #F0D080;
  --green: #006847;
  --green-dark: #004d35;
  --green-light: #e8f5ee;
  --bg: #f7f6f2;
  --white: #ffffff;
  --text: #1a1a1a;
  --muted: #6b7280;
  --border: rgba(0,0,0,0.1);
  --danger: #dc2626;
  --success: #16a34a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header { background: var(--green); color: white; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,104,71,0.3); }
.header-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--gold); }
.header-user { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.header-user span { opacity: 0.85; }
.btn-logout { background: rgba(255,255,255,0.15); border: none; color: white; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: 'DM Sans', sans-serif; }
.btn-logout:hover { background: rgba(255,255,255,0.25); }

/* NAV */
.nav-tabs { background: var(--white); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; }
.nav-tab { padding: 14px 20px; font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; color: var(--muted); transition: all .15s; }
.nav-tab:hover { color: var(--green); }
.nav-tab.active { color: var(--green); border-bottom-color: var(--gold); }

/* LAYOUT */
.container { max-width: 760px; margin: 0 auto; padding: 1.5rem 1rem; }
.hidden { display: none !important; }

/* LOGIN */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--green); }
.login-card { background: white; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 3px; color: var(--green); text-align: center; margin-bottom: .25rem; }
.login-sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 2rem; }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
.form-group input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border .15s; }
.form-group input:focus { border-color: var(--green); }
.btn-login { width: 100%; padding: 12px; background: var(--green); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background .15s; }
.btn-login:hover { background: var(--green-dark); }
.error-msg { color: var(--danger); font-size: 13px; margin-top: .5rem; }

/* CARDS */
.card { background: var(--white); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid var(--border); }
.card-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; color: var(--green); margin-bottom: 1rem; }
.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .75rem; }

/* GRUPOS GRID */
.groups-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
@media(max-width:520px) { .groups-grid { grid-template-columns: 1fr; } }
.group-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
.group-label { font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: var(--green); margin-bottom: .75rem; letter-spacing: 1px; }

/* MATCH ROW */
.match-row { display: flex; align-items: center; gap: 6px; padding: 5px 0; border-bottom: 1px solid #f0f0f0; }
.match-row:last-child { border-bottom: none; }
.team { flex: 1; font-size: 12px; font-weight: 500; }
.team.right { text-align: right; }
.score-box { display: flex; align-items: center; gap: 3px; }
input.score { width: 34px; height: 30px; text-align: center; border: 1.5px solid var(--border); border-radius: 6px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; outline: none; background: var(--bg); color: var(--text); transition: border .15s; }
input.score:focus { border-color: var(--green); background: white; }
input.score:disabled { background: #f5f5f5; color: var(--muted); cursor: not-allowed; }
.sep { font-size: 11px; color: var(--muted); }

/* CLASSIFICAÇÃO CALCULADA */
.standing { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
.standing-pos { min-width: 18px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
.pos-1 { background: var(--gold); color: #6b4a00; }
.pos-2 { background: #d1d5db; color: #374151; }
.pos-3 { background: #f3f4f6; color: var(--muted); }
.pos-4 { background: #f3f4f6; color: var(--muted); }
.standing-team { flex: 1; }
.standing-pts { font-weight: 600; font-size: 11px; }
.standing-detail { font-size: 10px; color: var(--muted); }

/* EXTRAS */
.extras-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
@media(max-width:520px) { .extras-grid { grid-template-columns: 1fr; } }
.extra-item label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 4px; }
.extra-item select, .extra-item input[type=text] { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); outline: none; }
.extra-item select:focus, .extra-item input[type=text]:focus { border-color: var(--green); background: white; }
.pts-badge { display: inline-block; background: var(--gold); color: #6b4a00; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-left: 4px; }

/* RANKING */
.rank-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
.rank-row:last-child { border-bottom: none; }
.rank-num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--muted); min-width: 28px; }
.rank-num.top { color: var(--gold); }
.rank-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: var(--green); flex-shrink: 0; }
.rank-name { flex: 1; font-weight: 500; font-size: 14px; }
.rank-name small { display: block; font-size: 11px; color: var(--muted); font-weight: 400; }
.rank-pts { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--green); }
.rank-pts small { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--muted); font-weight: 400; }
.you-badge { background: var(--green); color: white; font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 600; margin-left: 6px; }

/* ADMIN */
.admin-form { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
.admin-form input { flex: 1; min-width: 120px; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; }
.btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; transition: all .15s; }
.btn-green { background: var(--green); color: white; }
.btn-green:hover { background: var(--green-dark); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-danger { background: #fee2e2; color: var(--danger); }
.btn-danger:hover { background: #fecaca; }
.user-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
.user-row:last-child { border-bottom: none; }

/* PONTUAÇÃO TABLE */
.pts-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.pts-table tr { border-bottom: 1px solid #f0f0f0; }
.pts-table td { padding: 8px 4px; }
.pts-table td:last-child { text-align: right; font-weight: 700; color: var(--green); white-space: nowrap; }

/* LOADING */
.loading { text-align: center; padding: 3rem; color: var(--muted); }
.spinner { width: 32px; height: 32px; border: 3px solid #e5e7eb; border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }

/* SAVE INDICATOR */
.save-indicator { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--green); color: white; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .3s; pointer-events: none; }
.save-indicator.show { opacity: 1; }

/* RESULTADO REAL highlight */
input.score.real-score { border-color: var(--green); background: #e8f5ee; }
</style>
</head>

<script>
const SUPABASE_URL = 'https://ysbxncejiktqolfsfwe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzYnhuY2VqaWt0cW9sZmlzZndlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTUzNzMsImV4cCI6MjA5NTI3MTM3M30.K_jiW1Il_dIosGyu-AftMfDd1GtwuN7gqdo_iAzBLng';

const GROUPS = {
  A:['México','África do Sul','Coreia do Sul','Rep. Tcheca'],
  B:['Canadá','Bósnia-Herz.','Catar','Suíça'],
  C:['Brasil','Marrocos','Haiti','Escócia'],
  D:['EUA','Paraguai','Austrália','Turquia'],
  E:['Alemanha','Curaçao','Costa do Marfim','Equador'],
  F:['Holanda','Japão','Suécia','Tunísia'],
  G:['Bélgica','Egito','Irã','Nova Zelândia'],
  H:['Espanha','Cabo Verde','Arábia Saudita','Uruguai'],
  I:['França','Senegal','Noruega','Iraque'],
  J:['Argentina','Argélia','Áustria','Jordânia'],
  K:['Portugal','Uzbequistão','Colômbia','RD Congo'],
  L:['Inglaterra','Croácia','Gana','Panamá']
};

const ALL_TEAMS = Object.values(GROUPS).flat().sort();

// Generate matches for each group
const GROUP_MATCHES = {};
Object.entries(GROUPS).forEach(([g,t]) => {
  GROUP_MATCHES[g] = [];
  for(let i=0;i<t.length;i++) for(let j=i+1;j<t.length;j++)
    GROUP_MATCHES[g].push([t[i],t[j]]);
});

const EXTRAS = [
  {key:'champ', label:'Campeão', pts:30, type:'team'},
  {key:'vice', label:'Vice-campeão', pts:20, type:'team'},
  {key:'third', label:'3º lugar', pts:10, type:'team'},
  {key:'fourth', label:'4º lugar', pts:5, type:'team'},
  {key:'artilheiro', label:'Artilheiro — Chuteira de Ouro', pts:15, type:'player'},
  {key:'bola_ouro', label:'Bola de Ouro', pts:15, type:'player'},
  {key:'luva', label:'Luva de Ouro — Goleiro', pts:10, type:'player'},
];

// --- Supabase helpers ---
async function sb(method, path, body) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates,return=minimal' : 'return=minimal'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (method === 'GET' || r.status === 200) {
    const text = await r.text();
    return text ? JSON.parse(text) : [];
  }
  return null;
}

const get = (path) => sb('GET', path);
const post = (path, body) => sb('POST', path, body);
const patch = (path, body) => sb('PATCH', path, body);
const del = (path) => sb('DELETE', path);

// --- State ---
let currentUser = null;
let allPalpites = {};      // match_key -> {h, a}
let allExtras = {};        // extra_key -> value
let realScores = {};       // match_key -> {h, a}
let realExtras = {};       // extra_key -> value
let allUsers = [];
let saveTimeout = null;

// --- Auth ---
async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  err.classList.add('hidden');
  if (!u || !p) { showErr(err, 'Preencha apelido e senha.'); return; }
  const users = await get(`users?username=eq.${encodeURIComponent(u)}&select=*`);
  if (!users || !users.length) { showErr(err, 'Usuário não encontrado.'); return; }
  if (users[0].password !== p) { showErr(err, 'Senha incorreta.'); return; }
  currentUser = users[0];
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('header-username').textContent = currentUser.username;
  await loadAllData();
  buildNav();
  showTab('palpites');
}

function doLogout() {
  currentUser = null; allPalpites = {}; allExtras = {}; realScores = {}; realExtras = {};
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}

function showErr(el, msg) { el.textContent = msg; el.classList.remove('hidden'); }

// --- Data loading ---
async function loadAllData() {
  const [myPalpites, myExtras, scores, rExtras] = await Promise.all([
    get(`palpites?user_id=eq.${currentUser.id}&select=*`),
    get(`palpites_extras?user_id=eq.${currentUser.id}&select=*`),
    get(`resultados?select=*`),
    get(`resultados_extras?select=*`)
  ]);
  allPalpites = {};
  (myPalpites||[]).forEach(p => allPalpites[p.match_key] = {h: p.goals_home, a: p.goals_away});
  allExtras = {};
  (myExtras||[]).forEach(e => allExtras[e.extra_key] = e.value);
  realScores = {};
  (scores||[]).forEach(s => realScores[s.match_key] = {h: s.goals_home, a: s.goals_away});
  realExtras = {};
  (rExtras||[]).forEach(e => realExtras[e.extra_key] = e.value);
}

async function loadAllUsers() {
  allUsers = await get(`users?select=*&order=username`) || [];
}

// --- Navigation ---
function buildNav() {
  const tabs = [
    {id:'palpites', label:'Meus Palpites'},
    {id:'classificacao', label:'Classificação dos Grupos'},
    {id:'extras', label:'Prêmios Finais'},
    {id:'ranking', label:'Ranking'},
    {id:'pontuacao', label:'Pontuação'},
  ];
  if (currentUser.is_admin) tabs.push({id:'admin', label:'⚙ Admin'});
  const nav = document.getElementById('nav-tabs');
  nav.innerHTML = tabs.map(t => `<div class="nav-tab" id="tab-${t.id}" onclick="showTab('${t.id}')">${t.label}</div>`).join('');
}

function showTab(id) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const el = document.getElementById('tab-' + id);
  if (el) el.classList.add('active');
  const c = document.getElementById('main-content');
  if (id === 'palpites') c.innerHTML = renderPalpites();
  else if (id === 'classificacao') c.innerHTML = renderClassificacao();
  else if (id === 'extras') c.innerHTML = renderExtras();
  else if (id === 'ranking') renderRankingAsync(c);
  else if (id === 'pontuacao') c.innerHTML = renderPontuacao();
  else if (id === 'admin') renderAdminAsync(c);
}

// --- Group standings calculation ---
function calcStandings(scores, group) {
  const teams = GROUPS[group];
  const matches = GROUP_MATCHES[group];
  const table = {};
  teams.forEach(t => table[t] = {pts:0, gf:0, ga:0, gd:0, w:0, d:0, l:0});
  matches.forEach((m, i) => {
    const key = `${group}_${i}`;
    const s = scores[key];
    if (s === undefined || s.h === undefined || s.h === null || s.a === undefined || s.a === null) return;
    const h = parseInt(s.h), a = parseInt(s.a);
    table[m[0]].gf += h; table[m[0]].ga += a; table[m[0]].gd += h-a;
    table[m[1]].gf += a; table[m[1]].ga += h; table[m[1]].gd += a-h;
    if (h > a) { table[m[0]].pts+=3; table[m[0]].w++; table[m[1]].l++; }
    else if (h < a) { table[m[1]].pts+=3; table[m[1]].w++; table[m[0]].l++; }
    else { table[m[0]].pts+=1; table[m[0]].d++; table[m[1]].pts+=1; table[m[1]].d++; }
  });
  return Object.entries(table)
    .map(([name, s]) => ({name, ...s}))
    .sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.name.localeCompare(b.name));
}

// --- Render Palpites ---
function renderPalpites() {
  let html = '';
  Object.entries(GROUP_MATCHES).forEach(([g, matches]) => {
    html += `<div class="card"><div class="card-title">Grupo ${g}</div>`;
    matches.forEach((m, i) => {
      const key = `${g}_${i}`;
      const p = allPalpites[key] || {};
      const r = realScores[key] || {};
      const hasReal = r.h !== undefined && r.h !== null;
      html += `<div class="match-row">
        <span class="team">${m[0]}</span>
        <div class="score-box">
          <input class="score${hasReal?' real-score':''}" type="number" min="0" max="30" value="${p.h??''}" placeholder="–"
            data-key="${key}" data-side="h" onchange="savePalpite(this)" ${hasReal?'disabled':''}>
          <span class="sep">×</span>
          <input class="score${hasReal?' real-score':''}" type="number" min="0" max="30" value="${p.a??''}" placeholder="–"
            data-key="${key}" data-side="a" onchange="savePalpite(this)" ${hasReal?'disabled':''}>
        </div>
        <span class="team right">${m[1]}</span>
      </div>`;
    });
    html += `</div>`;
  });
  return html;
}

// --- Render Classificação (calculada) ---
function renderClassificacao() {
  let html = `<div style="background:#e8f5ee;border:1px solid #b6dfcc;border-radius:10px;padding:.75rem 1rem;margin-bottom:1rem;font-size:13px;color:var(--green);">
    <b>Como funciona:</b> A classificação de cada grupo é calculada automaticamente com base nos seus palpites de placares. 1º e 2º colocados valem pontos na apuração final.
  </div><div class="groups-grid">`;
  Object.keys(GROUPS).forEach(g => {
    const standings = calcStandings(allPalpites, g);
    html += `<div class="group-card"><div class="group-label">Grupo ${g}</div>`;
    standings.forEach((t, i) => {
      const posClass = `pos-${i+1}`;
      html += `<div class="standing">
        <span class="standing-pos ${posClass}">${i+1}</span>
        <span class="standing-team" style="font-size:12px;font-weight:${i<2?'600':'400'}">${t.name}</span>
        <span class="standing-pts">${t.pts}pts</span>
        <span class="standing-detail">${t.gd>=0?'+':''}${t.gd} | ${t.gf}g</span>
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}

// --- Render Extras ---
function renderExtras() {
  let html = `<div class="card"><div class="card-title">Palpites finais do torneio</div><div class="extras-grid">`;
  EXTRAS.forEach(e => {
    const val = allExtras[e.key] || '';
    html += `<div class="extra-item">
      <label>${e.label} <span class="pts-badge">${e.pts}pts</span></label>`;
    if (e.type === 'team') {
      html += `<select data-ex="${e.key}" onchange="saveExtra(this)">
        <option value="">— escolha</option>
        ${ALL_TEAMS.map(t => `<option${val===t?' selected':''}>${t}</option>`).join('')}
      </select>`;
    } else {
      html += `<input type="text" value="${val}" placeholder="Nome do jogador" data-ex="${e.key}" onchange="saveExtra(this)">`;
    }
    html += `</div>`;
  });
  html += `</div></div>`;
  return html;
}

// --- Points calculation ---
function calcUserPoints(palpites, extras, pUserStandings) {
  let pts = 0;

  // Group matches
  Object.entries(GROUP_MATCHES).forEach(([g, matches]) => {
    matches.forEach((m, i) => {
      const key = `${g}_${i}`;
      const pal = palpites[key] || {};
      const real = realScores[key] || {};
      if (pal.h === undefined || pal.h === null || real.h === undefined || real.h === null) return;
      const ph = parseInt(pal.h), pa = parseInt(pal.a), rh = parseInt(real.h), ra = parseInt(real.a);
      if (ph === rh) pts += 1;
      if (pa === ra) pts += 1;
      if (ph - pa === rh - ra) pts += 2;
      const rw = rh > ra ? 'h' : rh < ra ? 'a' : 'd';
      const pw = ph > pa ? 'h' : ph < pa ? 'a' : 'd';
      if (rw === pw) pts += 2;
    });
  });

  // Group standings vs real
  Object.keys(GROUPS).forEach(g => {
    const realStand = calcStandings(realScores, g);
    const palStand = pUserStandings ? calcStandings(palpites, g) : [];
    if (realStand.length < 2 || palStand.length < 2) return;
    const r1 = realStand[0]?.name, r2 = realStand[1]?.name;
    const p1 = palStand[0]?.name, p2 = palStand[1]?.name;
    if (!r1 || !r2 || !p1 || !p2) return;
    if (p1 === r1) pts += 2;
    if (p2 === r2) pts += 2;
    if (p1 !== p2 && p1 === r2 && p2 === r1) pts += 1;
  });

  // Extras
  EXTRAS.forEach(e => {
    const pv = (extras[e.key]||'').toLowerCase().trim();
    const rv = (realExtras[e.key]||'').toLowerCase().trim();
    if (pv && rv && pv === rv) pts += e.pts;
  });

  return pts;
}

// --- Ranking ---
async function renderRankingAsync(c) {
  c.innerHTML = `<div class="loading"><div class="spinner"></div>Calculando...</div>`;
  const users = await get(`users?select=*`) || [];
  const allP = await get(`palpites?select=*`) || [];
  const allE = await get(`palpites_extras?select=*`) || [];

  const ranked = users.map(u => {
    const uPal = {};
    allP.filter(p => p.user_id === u.id).forEach(p => uPal[p.match_key] = {h: p.goals_home, a: p.goals_away});
    const uEx = {};
    allE.filter(e => e.user_id === u.id).forEach(e => uEx[e.extra_key] = e.value);
    return {name: u.username, pts: calcUserPoints(uPal, uEx, true)};
  }).sort((a,b) => b.pts - a.pts);

  let html = `<div class="card"><div class="card-title">Ranking geral</div>`;
  ranked.forEach((r, i) => {
    const isYou = r.name === currentUser.username;
    const initials = r.name.substring(0,2).toUpperCase();
    html += `<div class="rank-row">
      <div class="rank-num${i<3?' top':''}">${i+1}</div>
      <div class="rank-avatar">${initials}</div>
      <div class="rank-name">${r.name}${isYou?'<span class="you-badge">você</span>':''}
        <small>${i===0?'🥇 Líder':i===1?'🥈 2º lugar':i===2?'🥉 3º lugar':''}</small>
      </div>
      <div class="rank-pts">${r.pts}<small> pts</small></div>
    </div>`;
  });
  html += `</div>`;
  c.innerHTML = html;
}

// --- Admin ---
async function renderAdminAsync(c) {
  c.innerHTML = `<div class="loading"><div class="spinner"></div>Carregando...</div>`;
  await loadAllUsers();
  let html = `<div class="card"><div class="card-title">Participantes</div>
  <div class="admin-form">
    <input type="text" id="new-username" placeholder="Apelido">
    <input type="password" id="new-password" placeholder="Senha">
    <button class="btn btn-green" onclick="addUser()">+ Adicionar</button>
  </div>
  <div id="user-list">`;
  allUsers.filter(u => !u.is_admin).forEach(u => {
    html += `<div class="user-row">
      <span style="flex:1;font-weight:500">${u.username}</span>
      <button class="btn btn-sm btn-danger" onclick="removeUser('${u.id}','${u.username}')">Remover</button>
    </div>`;
  });
  html += `</div></div>`;

  html += `<div class="card"><div class="card-title">Resultados Reais — Fase de Grupos</div>
  <p style="font-size:12px;color:var(--muted);margin-bottom:1rem">Insira os placares reais conforme os jogos acontecem. Os campos ficam verdes após preenchimento.</p>`;
  Object.entries(GROUP_MATCHES).forEach(([g, matches]) => {
    html += `<div style="margin-bottom:1rem"><div class="section-label">Grupo ${g}</div>`;
    matches.forEach((m, i) => {
      const key = `${g}_${i}`;
      const r = realScores[key] || {};
      const filled = r.h !== undefined && r.h !== null;
      html += `<div class="match-row">
        <span class="team" style="font-size:12px">${m[0]}</span>
        <div class="score-box">
          <input class="score${filled?' real-score':''}" type="number" min="0" max="30" value="${r.h??''}" placeholder="–"
            data-rkey="${key}" data-rside="h" onchange="saveReal(this)" style="font-size:12px">
          <span class="sep">×</span>
          <input class="score${filled?' real-score':''}" type="number" min="0" max="30" value="${r.a??''}" placeholder="–"
            data-rkey="${key}" data-rside="a" onchange="saveReal(this)" style="font-size:12px">
        </div>
        <span class="team right" style="font-size:12px">${m[1]}</span>
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  html += `<div class="card"><div class="card-title">Resultados Finais Reais</div><div class="extras-grid">`;
  EXTRAS.forEach(e => {
    const val = realExtras[e.key] || '';
    html += `<div class="extra-item"><label>${e.label}</label>`;
    if (e.type === 'team') {
      html += `<select data-rex="${e.key}" onchange="saveRealExtra(this)">
        <option value="">—</option>${ALL_TEAMS.map(t=>`<option${val===t?' selected':''}>${t}</option>`).join('')}
      </select>`;
    } else {
      html += `<input type="text" value="${val}" placeholder="Nome" data-rex="${e.key}" onchange="saveRealExtra(this)">`;
    }
    html += `</div>`;
  });
  html += `</div></div>`;

  c.innerHTML = html;
}

// --- Save functions ---
async function savePalpite(el) {
  const key = el.dataset.key;
  const side = el.dataset.side;
  const val = el.value === '' ? null : parseInt(el.value);
  if (!allPalpites[key]) allPalpites[key] = {};
  allPalpites[key][side] = val;
  const existing = allPalpites[key];
  await post('palpites', {
    user_id: currentUser.id, match_key: key,
    goals_home: existing.h ?? null, goals_away: existing.a ?? null
  });
  flashSave();
}

async function saveExtra(el) {
  const key = el.dataset.ex;
  allExtras[key] = el.value;
  await post('palpites_extras', {user_id: currentUser.id, extra_key: key, value: el.value});
  flashSave();
}

async function saveReal(el) {
  const key = el.dataset.rkey;
  const side = el.dataset.rside;
  const val = el.value === '' ? null : parseInt(el.value);
  if (!realScores[key]) realScores[key] = {};
  realScores[key][side] = val;
  const s = realScores[key];
  await post('resultados', {match_key: key, goals_home: s.h ?? null, goals_away: s.a ?? null});
  el.classList.toggle('real-score', val !== null);
  flashSave();
}

async function saveRealExtra(el) {
  const key = el.dataset.rex;
  realExtras[key] = el.value;
  await post('resultados_extras', {extra_key: key, value: el.value});
  flashSave();
}

async function addUser() {
  const u = document.getElementById('new-username').value.trim();
  const p = document.getElementById('new-password').value;
  if (!u || !p) { alert('Preencha apelido e senha.'); return; }
  const exists = await get(`users?username=eq.${encodeURIComponent(u)}&select=id`);
  if (exists && exists.length) { alert('Apelido já existe.'); return; }
  await post('users', {username: u, password: p, is_admin: false});
  await renderAdminAsync(document.getElementById('main-content'));
}

async function removeUser(id, name) {
  if (!confirm(`Remover ${name}? Os palpites também serão apagados.`)) return;
  await del(`users?id=eq.${id}`);
  await renderAdminAsync(document.getElementById('main-content'));
}

function flashSave() {
  const el = document.getElementById('save-indicator');
  el.classList.add('show');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => el.classList.remove('show'), 1800);
}
</script>
