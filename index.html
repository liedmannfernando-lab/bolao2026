      const pts = val ? extraPoints(e, val) : '';
      rows.push([u.user.nickname,'Prêmio','','',e.label,val,'','',real,'','',pts]);
    });
  });
  rows.push([]);
  rows.push(['=== PALPITES DE PRÊMIOS ===']);
  rows.push(['Apelido', ...EXTRAS.map(e => e.label)]);
  data.forEach(u => rows.push([u.user.nickname, ...EXTRAS.map(e => u.extras[e.key]||'')]));
  downloadCSV('bolao_completo_2026.csv', rows);
}

window.exportTudoPDF = async function() {
  const data = await gatherAllData();
  let body = `<h1>📋 Relatório completo — Bolão Copa 2026</h1><div class="subtitle">${new Date().toLocaleString('pt-BR')}</div>
  <h2>🏆 Ranking</h2><table><thead><tr><th>#</th><th>Apelido</th><th style="text-align:right">Base</th><th style="text-align:right">Aj.</th><th style="text-align:right">Total</th></tr></thead><tbody>`;
  data.forEach((u, i) => body += `<tr class="${i===0?'gold':''}"><td><b>${i+1}</b></td><td>${u.user.nickname}</td><td style="text-align:right">${u.basePts}</td><td style="text-align:right">${u.adj!==0?(u.adj>0?'+':'')+u.adj:'—'}</td><td style="text-align:right"><b>${u.totalPts}</b></td></tr>`);
  body += `</tbody></table><h2>🎯 Resultados Oficiais</h2>`;
  const matchesByGroup = {};
  MATCHES.forEach(m => { if (!matchesByGroup[m.g]) matchesByGroup[m.g] = []; matchesByGroup[m.g].push(m); });
  body += `<table><thead><tr><th>Grupo</th><th>Confronto</th><th style="text-align:center">Resultado</th></tr></thead><tbody>`;
  Object.keys(matchesByGroup).sort().forEach(g => matchesByGroup[g].forEach(m => {
    const r = realScores[m.key] || {};
    const score = r.h !== undefined && r.h !== null ? `<b>${r.h} × ${r.a}</b>` : '—';
    body += `<tr><td>${m.g}</td><td>${m.h} × ${m.a}</td><td style="text-align:center">${score}</td></tr>`;
  }));
  body += `</tbody></table><h2>🏅 Prêmios</h2><table><thead><tr><th>Prêmio</th><th>Vencedor</th></tr></thead><tbody>`;
  EXTRAS.forEach(e => body += `<tr><td>${e.label}</td><td><b>${realExtras[e.key]||'—'}</b></td></tr>`);
  body += `</tbody></table><h2>👥 Palpites por participante</h2>`;
  data.forEach(u => {
    body += `<h3>${u.user.nickname} — ${u.totalPts} pts</h3>`;
    body += `<table><thead><tr><th>G</th><th>Confronto</th><th>Palpite</th><th>Real</th><th>⭐</th><th style="text-align:right">Pts</th></tr></thead><tbody>`;
    MATCHES.forEach(m => {
      const p = u.palpites[m.key] || {}; const r = realScores[m.key] || {};
      const isDbl = u.doubles[m.g] === m.key; let pts = '—';
      if (p.h !== undefined && p.h !== null && r.h !== undefined && r.h !== null) {
        let bp = calcMatchPoints(p, r); if (isDbl) bp *= 2; pts = bp;
      }
      const palStr = p.h !== undefined && p.h !== null ? `${p.h}×${p.a}` : '—';
      const realStr = r.h !== undefined && r.h !== null ? `${r.h}×${r.a}` : '—';
      body += `<tr><td>${m.g}</td><td>${m.h} × ${m.a}</td><td>${palStr}</td><td>${realStr}</td><td>${isDbl?'⭐':''}</td><td style="text-align:right">${pts}</td></tr>`;
    });
    body += `</tbody></table>`;
    // Mata-mata do participante
    if (koMatches.length) {
      body += `<table><thead><tr><th>Fase</th><th>Confronto</th><th>Palpite</th><th>Real</th><th>⭐</th><th style="text-align:right">Pts</th></tr></thead><tbody>`;
      koMatches.forEach(m => {
        const phase = KO_PHASES.find(p => p.id === m.phase);
        const pal = u.ko[m.id] || {};
        const isDbl = u.koDoubles[m.phase] === m.id; let pts = '—';
        if (pal.h !== undefined && pal.h !== null && m.real_home !== undefined && m.real_home !== null) {
          let bp = calcMatchPoints({h:pal.h,a:pal.a}, {h:m.real_home,a:m.real_away});
          if (isDbl) bp *= 2; bp *= phase.multiplier; pts = bp;
        }
        const palStr = pal.h !== undefined && pal.h !== null ? `${pal.h}×${pal.a}` : '—';
        const realStr = m.real_home !== undefined && m.real_home !== null ? `${m.real_home}×${m.real_away}` : '—';
        body += `<tr><td>${phase?.short||m.phase}</td><td>${m.home||'?'} × ${m.away||'?'}</td><td>${palStr}</td><td>${realStr}</td><td>${isDbl?'⭐':''}</td><td style="text-align:right">${pts}</td></tr>`;
      });
      body += `</tbody></table>`;
    }
    // Prêmios do participante
    body += `<table><thead><tr><th>Prêmio</th><th>Palpite</th><th>Oficial</th><th style="text-align:right">Pts</th></tr></thead><tbody>`;
    EXTRAS.forEach(e => {
      const val = u.extras[e.key] || '—';
      const real = realExtras[e.key] || '—';
      const pts = (u.extras[e.key]) ? extraPoints(e, u.extras[e.key]) : '—';
      body += `<tr><td>${e.label}</td><td>${val}</td><td>${real}</td><td style="text-align:right">${pts}</td></tr>`;
    });
    body += `</tbody></table>`;
  });
  openPrintWindow('Relatório Completo', body);
}
