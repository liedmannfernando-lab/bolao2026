<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #F0D080;
  --green: #006847;
  --green-dark: #004d35;
  --green-light: #e8f5ee;
  --red: #CE1126;
  --bg: #f7f6f2;
  --white: #ffffff;
  --text: #1a1a1a;
  --muted: #6b7280;
  --border: rgba(0,0,0,0.1);
  --danger: #dc2626;
  --success: #16a34a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--green); color: white; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,104,71,0.3); }
.header-logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--gold); display: flex; align-items: center; gap: 8px; }
.header-user { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.header-user span { opacity: 0.9; font-weight: 500; }
.btn-logout { background: rgba(255,255,255,0.15); border: none; color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; }
.btn-logout:hover { background: rgba(255,255,255,0.25); }

.nav-tabs { background: var(--white); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; padding: 0 1rem; }
.nav-tab { padding: 14px 18px; font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; color: var(--muted); transition: all .15s; }
.nav-tab:hover { color: var(--green); }
.nav-tab.active { color: var(--green); border-bottom-color: var(--gold); font-weight: 600; }

.container { max-width: 780px; margin: 0 auto; padding: 1.5rem 1rem; }
.hidden { display: none !important; }

.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--green); position: relative; overflow: hidden; }
.login-wrap::before { content: ''; position: absolute; top: -50%; left: -20%; width: 140%; height: 200%; background: radial-gradient(circle at 30% 40%, rgba(201,168,76,0.15), transparent 50%), radial-gradient(circle at 70% 60%, rgba(206,17,38,0.1), transparent 50%); }
.login-card { background: white; border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; box-shadow: 0 30px 80px rgba(0,0,0,0.3); position: relative; z-index: 2; }
.login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 3px; color: var(--green); text-align: center; line-height: 1; }
.login-sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 1.5rem; letter-spacing: 1px; text-transform: uppercase; }
.login-banner { background: var(--green-light); border-radius: 10px; padding: 10px 14px; font-size: 12px; color: var(--green-dark); margin-bottom: 1.5rem; text-align: center; }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .08em; }
.form-group input { width: 100%; padding: 11px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border .15s; }
.form-group input:focus { border-color: var(--green); }
.btn-login { width: 100%; padding: 13px; background: var(--green); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background .15s; margin-top: .5rem; }
.btn-login:hover { background: var(--green-dark); }
.btn-login:disabled { opacity: 0.6; cursor: wait; }
.error-msg { color: var(--danger); font-size: 13px; margin-top: .5rem; padding: 8px 12px; background: #fee2e2; border-radius: 6px; }

.card { background: var(--white); border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid var(--border); }
.card-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1.5px; color: var(--green); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
.card-title .group-badge { background: var(--gold); color: white; padding: 2px 10px; border-radius: 6px; font-size: 14px; }
.section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .75rem; }

.banner { background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%); color: white; padding: 1.25rem 1.25rem; border-radius: 14px; margin-bottom: 1.5rem; position: relative; overflow: hidden; }
.banner::before { content: ''; position: absolute; top: -20px; right: -20px; width: 120px; height: 120px; border-radius: 50%; background: rgba(201,168,76,0.15); }
.banner-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--gold); margin-bottom: 4px; position: relative; }
.banner-text { font-size: 13px; opacity: 0.92; line-height: 1.5; position: relative; }

.groups-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
@media(max-width:600px) { .groups-grid { grid-template-columns: 1fr; } }
.group-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
.group-label { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--green); margin-bottom: .75rem; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
.group-label .gbadge { background: var(--gold); color: white; padding: 1px 8px; border-radius: 5px; font-size: 13px; }

.match-row { display: flex; align-items: center; gap: 6px; padding: 7px 0; border-bottom: 1px solid #f0f0f0; }
.match-row:last-child { border-bottom: none; }
.team { flex: 1; font-size: 12.5px; font-weight: 500; }
.team.right { text-align: right; }
.score-box { display: flex; align-items: center; gap: 4px; }
input.score { width: 36px; height: 32px; text-align: center; border: 1.5px solid var(--border); border-radius: 7px; font-size: 14px; font-weight: 700; font-family: 'DM Sans', sans-serif; outline: none; background: var(--bg); color: var(--text); transition: all .15s; }
input.score:focus { border-color: var(--green); background: white; }
input.score:disabled { background: var(--green-light); color: var(--green-dark); cursor: not-allowed; border-color: var(--green); }
.sep { font-size: 11px; color: var(--muted); font-weight: 600; }

.standing { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; }
.standing-pos { min-width: 20px; height: 20px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
.pos-1 { background: var(--gold); color: #6b4a00; }
.pos-2 { background: #b8b8b8; color: #1a1a1a; }
.pos-3 { background: #f3f4f6; color: var(--muted); }
.pos-4 { background: #f3f4f6; color: var(--muted); }
.standing-team { flex: 1; }
.standing-pts { font-weight: 700; font-size: 11px; color: var(--green); }
.standing-detail { font-size: 10px; color: var(--muted); min-width: 50px; text-align: right; }

.extras-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
@media(max-width:600px) { .extras-grid { grid-template-columns: 1fr; } }
.extra-item label { display: flex; align-items: center; justify-content: space-between; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 5px; }
.extra-item select, .extra-item input[type=text] { width: 100%; padding: 9px 11px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); outline: none; }
.extra-item select:focus, .extra-item input[type=text]:focus { border-color: var(--green); background: white; }
.pts-badge { display: inline-block; background: var(--gold); color: #4a3500; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; text-transform: none; letter-spacing: 0; }

.rank-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
.rank-row:last-child { border-bottom: none; }
.rank-row.top-1 { background: linear-gradient(90deg, rgba(201,168,76,0.08), transparent); margin: 0 -.5rem; padding-left: .5rem; padding-right: .5rem; border-radius: 8px; border-bottom: none; }
.rank-num { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--muted); min-width: 30px; }
.rank-num.top { color: var(--gold); }
.rank-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: var(--green); flex-shrink: 0; }
.rank-name { flex: 1; font-weight: 600; font-size: 14px; }
.rank-name small { display: block; font-size: 11px; color: var(--muted); font-weight: 400; }
.rank-pts { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--green); }
.rank-pts small { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--muted); font-weight: 400; }
.you-badge { background: var(--green); color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; margin-left: 6px; vertical-align: middle; }

.admin-form { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; align-items: end; }
.admin-form input { flex: 1; min-width: 120px; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; }
.btn { padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; transition: all .15s; }
.btn-green { background: var(--green); color: white; }
.btn-green:hover { background: var(--green-dark); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-danger { background: #fee2e2; color: var(--danger); }
.btn-danger:hover { background: #fecaca; }
.user-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
.user-row:last-child { border-bottom: none; }

.pts-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.pts-table tr { border-bottom: 1px solid #f0f0f0; }
.pts-table tr:last-child { border-bottom: none; }
.pts-table td { padding: 10px 4px; }
.pts-table td:last-child { text-align: right; font-weight: 700; color: var(--green); white-space: nowrap; font-size: 13px; }
.pts-table .section-row td { background: var(--green-light); color: var(--green-dark); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; padding: 6px 8px; }

.loading { text-align: center; padding: 3rem; color: var(--muted); }
.spinner { width: 36px; height: 36px; border: 3px solid #e5e7eb; border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }

.save-indicator { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--green); color: white; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .3s; pointer-events: none; box-shadow: 0 4px 20px rgba(0,104,71,0.4); z-index: 1000; }
.save-indicator.show { opacity: 1; }

input.real-score { border-color: var(--green); background: var(--green-light); color: var(--green-dark); }
.info-box { background: var(--green-light); border-left: 4px solid var(--green); padding: 10px 14px; font-size: 13px; color: var(--green-dark); margin-bottom: 1rem; border-radius: 0 8px 8px 0; }
</style>
</head>
<body>

<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">BOLÃO 2026</div>
    <div class="login-sub">Copa do Mundo FIFA</div>

<script type="module">

};

window.fb = { db, collection, doc, getDoc, getDocs, setDoc, deleteDoc };

<script>
const GROUPS = {
  A:{teams:['México','África do Sul','Coreia do Sul','Rep. Tcheca'], flag:'🇲🇽'},
  B:{teams:['Canadá','Bósnia-Herz.','Catar','Suíça'], flag:'🇨🇦'},
  C:{teams:['Brasil','Marrocos','Haiti','Escócia'], flag:'🇧🇷'},
  D:{teams:['EUA','Paraguai','Austrália','Turquia'], flag:'🇺🇸'},
  E:{teams:['Alemanha','Curaçao','Costa do Marfim','Equador'], flag:'🇩🇪'},
  F:{teams:['Holanda','Japão','Suécia','Tunísia'], flag:'🇳🇱'},
  G:{teams:['Bélgica','Egito','Irã','Nova Zelândia'], flag:'🇧🇪'},
  H:{teams:['Espanha','Cabo Verde','Arábia Saudita','Uruguai'], flag:'🇪🇸'},
  I:{teams:['França','Senegal','Noruega','Iraque'], flag:'🇫🇷'},
  J:{teams:['Argentina','Argélia','Áustria','Jordânia'], flag:'🇦🇷'},
  K:{teams:['Portugal','Uzbequistão','Colômbia','RD Congo'], flag:'🇵🇹'},
  L:{teams:['Inglaterra','Croácia','Gana','Panamá'], flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'}
};

const ALL_TEAMS = Object.values(GROUPS).flatMap(g => g.teams).sort();

const GROUP_MATCHES = {};
Object.entries(GROUPS).forEach(([g,o]) => {
  const t = o.teams;
  GROUP_MATCHES[g] = [];
  for(let i=0;i<t.length;i++) for(let j=i+1;j<t.length;j++)
    GROUP_MATCHES[g].push([t[i],t[j]]);
});

const EXTRAS = [
  {key:'champ', label:'Campeão', pts:30, type:'team'},
  {key:'vice', label:'Vice-campeão', pts:20, type:'team'},
  {key:'third', label:'3º lugar', pts:10, type:'team'},
  {key:'fourth', label:'4º lugar', pts:5, type:'team'},
  {key:'artilheiro', label:'Artilheiro (Chuteira de Ouro)', pts:15, type:'player'},
  {key:'bola_ouro', label:'Bola de Ouro', pts:15, type:'player'},
  {key:'luva', label:'Luva de Ouro (Goleiro)', pts:10, type:'player'},
];

let currentUser = null;
let allPalpites = {};
let allExtras = {};
let realScores = {};
let realExtras = {};
let allUsers = [];
let saveTimeout = null;
let fbReady = false;

window.addEventListener('firebase-ready', () => { fbReady = true; });

async function waitFirebase() {
  if (fbReady) return;
  await new Promise(r => {
    if (fbReady) return r();
    window.addEventListener('firebase-ready', r, {once:true});
  });
}

async function fbGetDoc(coll, id) {
  const { db, doc, getDoc } = window.fb;
  const snap = await getDoc(doc(db, coll, id));
  return snap.exists() ? {id: snap.id, ...snap.data()} : null;
}

async function fbGetAll(coll) {
  const { db, collection, getDocs } = window.fb;
  const snap = await getDocs(collection(db, coll));
  return snap.docs.map(d => ({id: d.id, ...d.data()}));
}

async function fbSetDoc(coll, id, data) {
  const { db, doc, setDoc } = window.fb;
  await setDoc(doc(db, coll, id), data, {merge: true});
}

async function fbDelete(coll, id) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, coll, id));
}

async function ensureAdminExists() {
  const admin = await fbGetDoc('users', 'admin');
  if (!admin) {
    await fbSetDoc('users', 'admin', {username: 'admin', password: 'admin123', is_admin: true});
  }
}

window.doLogin = async function() {
  const u = document.getElementById('login-user').value.trim().toLowerCase();
  const p = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  const btn = document.getElementById('btn-login');
  err.classList.add('hidden');
  if (!u || !p) { showErr(err, 'Preencha apelido e senha.'); return; }
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    await waitFirebase();
    await ensureAdminExists();
    const user = await fbGetDoc('users', u);
    if (!user) { showErr(err, 'Usuário não encontrado.'); btn.disabled = false; btn.textContent = 'Entrar'; return; }
    if (user.password !== p) { showErr(err, 'Senha incorreta.'); btn.disabled = false; btn.textContent = 'Entrar'; return; }
    currentUser = user;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('header-username').textContent = currentUser.username;
    await loadAllData();
    buildNav();
    showTab('palpites');
  } catch (e) {
    showErr(err, 'Erro: ' + e.message);
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

window.doLogout = function() {
  currentUser = null; allPalpites = {}; allExtras = {}; realScores = {}; realExtras = {};
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('btn-login').disabled = false;
  document.getElementById('btn-login').textContent = 'Entrar';
}

function showErr(el, msg) { el.textContent = msg; el.classList.remove('hidden'); }

async function loadAllData() {
  const [palp, ext, sc, rExt] = await Promise.all([
    fbGetAll('palpites'),
    fbGetAll('palpites_extras'),
    fbGetAll('resultados'),
    fbGetAll('resultados_extras')
  ]);
  allPalpites = {};
  palp.filter(p => p.user_id === currentUser.id).forEach(p => allPalpites[p.match_key] = {h: p.goals_home, a: p.goals_away});
  allExtras = {};
  ext.filter(e => e.user_id === currentUser.id).forEach(e => allExtras[e.extra_key] = e.value);
  realScores = {};
  sc.forEach(s => realScores[s.id] = {h: s.goals_home, a: s.goals_away});
  realExtras = {};
  rExt.forEach(e => realExtras[e.id] = e.value);
}

async function loadAllUsers() {
  allUsers = await fbGetAll('users');
  allUsers.sort((a,b) => a.username.localeCompare(b.username));
}

function buildNav() {
  const tabs = [
    {id:'palpites', label:'Meus Palpites'},
    {id:'classificacao', label:'Classificação'},
    {id:'extras', label:'Prêmios Finais'},
    {id:'ranking', label:'Ranking'},
    {id:'pontuacao', label:'Pontuação'},
  ];
  if (currentUser.is_admin) tabs.push({id:'admin', label:'⚙ Admin'});
  const nav = document.getElementById('nav-tabs');
  nav.innerHTML = tabs.map(t => `<div class="nav-tab" id="tab-${t.id}" onclick="showTab('${t.id}')">${t.label}</div>`).join('');
}

window.showTab = function(id) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const el = document.getElementById('tab-' + id);
  if (el) el.classList.add('active');
  const c = document.getElementById('main-content');
  if (id === 'palpites') c.innerHTML = renderPalpites();
  else if (id === 'classificacao') c.innerHTML = renderClassificacao();
  else if (id === 'extras') c.innerHTML = renderExtras();
  else if (id === 'ranking') renderRankingAsync(c);
  else if (id === 'pontuacao') c.innerHTML = renderPontuacao();
  else if (id === 'admin') renderAdminAsync(c);
  window.scrollTo(0, 0);
}

function calcStandings(scores, group) {
  const teams = GROUPS[group].teams;
  const matches = GROUP_MATCHES[group];
  const table = {};
  teams.forEach(t => table[t] = {pts:0, gf:0, ga:0, gd:0, w:0, d:0, l:0});
  matches.forEach((m, i) => {
    const key = `${group}_${i}`;
    const s = scores[key];
    if (!s || s.h === undefined || s.h === null || s.a === undefined || s.a === null) return;
    const h = parseInt(s.h), a = parseInt(s.a);
    if (isNaN(h) || isNaN(a)) return;
    table[m[0]].gf += h; table[m[0]].ga += a; table[m[0]].gd += h-a;
    table[m[1]].gf += a; table[m[1]].ga += h; table[m[1]].gd += a-h;
    if (h > a) { table[m[0]].pts+=3; table[m[0]].w++; table[m[1]].l++; }
    else if (h < a) { table[m[1]].pts+=3; table[m[1]].w++; table[m[0]].l++; }
    else { table[m[0]].pts+=1; table[m[0]].d++; table[m[1]].pts+=1; table[m[1]].d++; }
  });
  return Object.entries(table)
    .map(([name, s]) => ({name, ...s}))
    .sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.name.localeCompare(b.name));
}

function calcUserPoints(palpites, extras) {
  let pts = 0;
  Object.entries(GROUP_MATCHES).forEach(([g, matches]) => {
    matches.forEach((m, i) => {
      const key = `${g}_${i}`;
      const pal = palpites[key] || {};
      const real = realScores[key] || {};
      if (pal.h === undefined || pal.h === null || real.h === undefined || real.h === null) return;
      const ph = parseInt(pal.h), pa = parseInt(pal.a), rh = parseInt(real.h), ra = parseInt(real.a);
      if (isNaN(ph)||isNaN(pa)||isNaN(rh)||isNaN(ra)) return;
      if (ph === rh) pts += 1;
      if (pa === ra) pts += 1;
      if (ph - pa === rh - ra) pts += 2;
      const rw = rh > ra ? 'h' : rh < ra ? 'a' : 'd';
      const pw = ph > pa ? 'h' : ph < pa ? 'a' : 'd';
      if (rw === pw) pts += 2;
    });
  });
  Object.keys(GROUPS).forEach(g => {
    const realStand = calcStandings(realScores, g);
    const palStand = calcStandings(palpites, g);
    if (realStand.length < 2 || palStand.length < 2) return;
    const r1 = realStand[0]?.name, r2 = realStand[1]?.name;
    const p1 = palStand[0]?.name, p2 = palStand[1]?.name;
    const realHasResults = realStand.some(t => t.pts > 0 || t.gf > 0);
    if (!realHasResults) return;
    if (p1 === r1) pts += 2;
    if (p2 === r2) pts += 2;
    if (p1 !== p2 && p1 === r2 && p2 === r1) pts += 1;
  });
  EXTRAS.forEach(e => {
    const pv = (extras[e.key]||'').toLowerCase().trim();
    const rv = (realExtras[e.key]||'').toLowerCase().trim();
    if (pv && rv && pv === rv) pts += e.pts;
  });
  return pts;
}

async function renderRankingAsync(c) {
  c.innerHTML = `<div class="loading"><div class="spinner"></div>Calculando ranking...</div>`;
  const [users, allP, allE] = await Promise.all([
    fbGetAll('users'),
    fbGetAll('palpites'),
    fbGetAll('palpites_extras')
  ]);
  const ranked = users.map(u => {
    const uPal = {};
    allP.filter(p => p.user_id === u.id).forEach(p => uPal[p.match_key] = {h: p.goals_home, a: p.goals_away});
    const uEx = {};
    allE.filter(e => e.user_id === u.id).forEach(e => uEx[e.extra_key] = e.value);
    return {name: u.username, pts: calcUserPoints(uPal, uEx)};
  }).sort((a,b) => b.pts - a.pts);

  let html = `<div class="banner">
    <div class="banner-title">🏆 Ranking geral</div>
    <div class="banner-text">${ranked.length} participante${ranked.length!==1?'s':''} no bolão</div>
  </div>
  <div class="card">`;
  if (!ranked.length) {
    html += `<p style="text-align:center;color:var(--muted);padding:2rem">Nenhum participante ainda.</p>`;
  } else {
    ranked.forEach((r, i) => {
      const isYou = r.name === currentUser.username;
      const initials = r.name.substring(0,2).toUpperCase();
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      const rowClass = i===0 ? 'rank-row top-1' : 'rank-row';
      html += `<div class="${rowClass}">
        <div class="rank-num${i<3?' top':''}">${i+1}</div>
        <div class="rank-avatar">${initials}</div>
        <div class="rank-name">${r.name}${isYou?'<span class="you-badge">você</span>':''}
          <small>${medal} ${i===0?'Líder do bolão':i===1?'2º lugar':i===2?'3º lugar':''}</small>
        </div>
        <div class="rank-pts">${r.pts}<small> pts</small></div>
      </div>`;
    });
  }
  html += `</div>`;
  c.innerHTML = html;
}

    const val = realExtras[e.key] || '';

window.savePalpite = async function(el) {
  const key = el.dataset.key;
  const side = el.dataset.side;
  const val = el.value === '' ? null : parseInt(el.value);
  if (!allPalpites[key]) allPalpites[key] = {};
  allPalpites[key][side] = val;
  const docId = `${currentUser.id}_${key}`;
  await fbSetDoc('palpites', docId, {
    user_id: currentUser.id, match_key: key,
    goals_home: allPalpites[key].h ?? null, goals_away: allPalpites[key].a ?? null
  });
  flashSave();
}

window.saveExtra = async function(el) {
  const key = el.dataset.ex;
  allExtras[key] = el.value;
  const docId = `${currentUser.id}_${key}`;
  await fbSetDoc('palpites_extras', docId, {user_id: currentUser.id, extra_key: key, value: el.value});
  flashSave();
}

window.saveReal = async function(el) {
  const key = el.dataset.rkey;
  const side = el.dataset.rside;
  const val = el.value === '' ? null : parseInt(el.value);
  if (!realScores[key]) realScores[key] = {};
  realScores[key][side] = val;
  await fbSetDoc('resultados', key, {goals_home: realScores[key].h ?? null, goals_away: realScores[key].a ?? null});
  el.classList.toggle('real-score', val !== null);
  flashSave();
}

window.saveRealExtra = async function(el) {
  const key = el.dataset.rex;
  realExtras[key] = el.value;
  await fbSetDoc('resultados_extras', key, {value: el.value});
  flashSave();
}

window.addUser = async function() {
  const u = document.getElementById('new-username').value.trim().toLowerCase();
  const p = document.getElementById('new-password').value;
  if (!u || !p) { alert('Preencha apelido e senha.'); return; }
  if (!/^[a-z0-9_-]+$/.test(u)) { alert('Apelido só pode conter letras minúsculas, números, hífen e underscore.'); return; }
  const exists = await fbGetDoc('users', u);
  if (exists) { alert('Apelido já existe.'); return; }
  await fbSetDoc('users', u, {username: u, password: p, is_admin: false});
  await renderAdminAsync(document.getElementById('main-content'));
}

window.removeUser = async function(id, name) {
  if (!confirm(`Remover ${name}? Os palpites também serão apagados.`)) return;
  const allP = await fbGetAll('palpites');
  const allE = await fbGetAll('palpites_extras');
  await Promise.all([
    ...allP.filter(p => p.user_id === id).map(p => fbDelete('palpites', p.id)),
    ...allE.filter(e => e.user_id === id).map(e => fbDelete('palpites_extras', e.id)),
    fbDelete('users', id)
  ]);
  await renderAdminAsync(document.getElementById('main-content'));
}

function flashSave() {
  const el = document.getElementById('save-indicator');
  el.classList.add('show');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => el.classList.remove('show'), 1800);
}
